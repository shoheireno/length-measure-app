<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>写真で長さ測定</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00897b">

<!-- iPhoneでホーム画面に追加した際にフルスクリーンのアプリ風に表示するための設定 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="長さ測定">
<link rel="apple-touch-icon" href="icon.svg">

<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-bar">
  <h1>写真で長さ測定</h1>
  <div class="app-bar-actions">
    <button id="undoBtn" class="icon-btn" title="1つ戻す" hidden>↺</button>
    <button id="resetBtn" class="icon-btn" title="すべてリセット" hidden>⟳</button>
  </div>
</header>

<main id="emptyState" class="empty-state">
  <div class="empty-icon">📏</div>
  <p>写真を選んで長さを測定しましょう</p>
  <button type="button" id="cameraBtn" class="btn btn-primary">📷 写真を撮る</button>
  <button type="button" id="galleryBtn" class="btn btn-outline">🖼️ ギャラリーから選ぶ</button>
  <input id="cameraInput" type="file" accept="image/*" capture="environment" class="visually-hidden">
  <input id="galleryInput" type="file" accept="image/*" class="visually-hidden">
</main>

<main id="measureView" class="measure-view" hidden>
  <div id="statusBar" class="status-bar"></div>

  <div id="canvasScroll" class="canvas-scroll">
    <canvas id="photoCanvas"></canvas>
  </div>

  <div id="measurementList" class="measurement-list" hidden></div>
</main>

<button type="button" id="changePhotoFab" class="fab" hidden>📷</button>
<input id="changePhotoInput" type="file" accept="image/*" class="visually-hidden">

<!-- 校正（基準の長さ入力）ダイアログ -->
<div id="calibDialog" class="dialog-overlay" hidden>
  <div class="dialog">
    <h2>基準の長さを入力</h2>
    <p>指定した2点間の実際の長さを入力してください<br>（例: 定規や名刺など、既知のサイズの物）</p>
    <div class="dialog-row">
      <input id="calibValue" type="number" inputmode="decimal" step="any" min="0" placeholder="長さ">
      <select id="calibUnit">
        <option value="mm">mm</option>
        <option value="cm" selected>cm</option>
        <option value="m">m</option>
        <option value="inch">inch</option>
      </select>
    </div>
    <div class="dialog-actions">
      <button id="calibCancel" class="btn btn-text">キャンセル</button>
      <button id="calibOk" class="btn btn-primary">設定</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
